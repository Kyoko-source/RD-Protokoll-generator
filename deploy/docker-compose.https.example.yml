services:
  nana:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        NANA_RELEASE_SHA: ${NANA_RELEASE_SHA:-local}
        NANA_RELEASE_DATE: ${NANA_RELEASE_DATE:-unknown}
    restart: unless-stopped
    env_file:
      - ./env.production
    volumes:
      - nana_data:/data
    expose:
      - "8000"

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    depends_on:
      - nana
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  nana_data:
  caddy_data:
  caddy_config:
