services:
  nana:
    build: .
    restart: unless-stopped
    environment:
      NANA_ENV: production
      NANA_DB_PATH: /data/nana.db
      NANA_DATA_KEY: "replace-with-a-long-random-secret"
      NANA_ALLOWED_ORIGINS: "https://nana.example.de"
    volumes:
      - nana_data:/data
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  nana_data:
